name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[all,dev]'
    - name: Lint (syntax errors only, fail build)
      run: flake8 --count --select=E9,F63,F7,F82 --show-source --statistics osint_cli_tool_skeleton
    - name: Test
      run: pytest -q
